<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>チーム年間スケジュール</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg: #EEF1F4;
  --paper: #FFFFFF;
  --grid-line: rgba(27,36,48,0.07);
  --ink: #1B2430;
  --muted: #6B7686;
  --line: #D8DEE6;
  --blue: #3A6EA5;
  --blue-soft: #E8F0F9;
  --tape: #F4C542;
  --ok: #2F9E64;
  --ok-soft: #E5F6EC;
  --warn: #DB9A2C;
  --warn-soft: #FCF1DC;
  --urgent: #D6483F;
  --urgent-soft: #FBE7E5;
  --shadow: 0 2px 8px rgba(27,36,48,0.08), 0 1px 2px rgba(27,36,48,0.06);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  background:
    radial-gradient(var(--grid-line) 1px, transparent 1px) 0 0/22px 22px,
    var(--bg);
  min-height: 100vh;
  padding: 28px 20px 60px;
}

.ts-header {
  max-width: 1080px;
  margin: 0 auto 22px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.ts-title {
  font-family: 'Kalam', cursive;
  font-weight: 700;
  font-size: 34px;
  letter-spacing: 0.5px;
  position: relative;
  display: inline-block;
}
.ts-title::after {
  content: '';
  position: absolute;
  left: -4px; right: -6px; bottom: 2px;
  height: 10px;
  background: var(--tape);
  opacity: 0.55;
  z-index: -1;
  transform: rotate(-1deg);
}

.ts-sub { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

.ts-reset { background: none; border: none; color: var(--muted); font-size: 12px; text-decoration: underline; cursor: pointer; font-family: 'Inter', sans-serif; }
.ts-reset:hover { color: var(--urgent); }
.ts-linkbtn { background: none; border: none; color: var(--blue); font-size: 12px; text-decoration: underline; cursor: pointer; font-family: 'Inter', sans-serif; margin-left: 10px; }

.ts-banner {
  max-width: 1080px; margin: 0 auto 18px;
  background: var(--urgent-soft); color: var(--urgent);
  border: 1px solid var(--urgent); border-radius: 8px;
  padding: 10px 14px; font-size: 13px;
}
.ts-banner.ok { background: var(--ok-soft); color: var(--ok); border-color: var(--ok); }

.ts-ruler-wrap { max-width: 1080px; margin: 0 auto 26px; background: var(--paper); border-radius: 10px; box-shadow: var(--shadow); padding: 18px 20px 14px; }
.ts-ruler-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.ts-year-nav { display: flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; }
.ts-year-btn { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 14px; color: var(--ink); }
.ts-year-btn:hover { background: var(--blue-soft); border-color: var(--blue); }

/* ---- Gantt chart ---- */
.gantt-scroll { overflow-x: auto; overflow-y: hidden; border: 1px solid var(--line); border-radius: 8px; }
.gantt-inner { position: relative; }

.gantt-header { display: flex; border-bottom: 2px solid var(--ink); background: var(--paper); position: relative; z-index: 1; }
.gantt-header-label { flex: 0 0 150px; width: 150px; border-right: 1px solid var(--line); position: sticky; left: 0; background: var(--paper); z-index: 2; }
.gantt-header-track { position: relative; }
.gantt-month-row { position: relative; height: 20px; border-bottom: 1px solid var(--line); }
.gantt-month {
  position: absolute; top: 0; height: 20px; line-height: 20px;
  font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
  border-left: 2px solid var(--ink); padding-left: 4px; box-sizing: border-box; color: var(--ink);
}
.gantt-day-row { position: relative; height: 26px; }
.gantt-day {
  position: absolute; top: 0; height: 26px; line-height: 26px; text-align: center;
  font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--ink);
  border-right: 1px solid rgba(27,36,48,0.05); box-sizing: border-box;
}
.gantt-day.sat { color: var(--blue); font-weight: 700; }
.gantt-day.sun { color: var(--urgent); font-weight: 700; }

.gantt-body { position: relative; z-index: 1; }
.gantt-row { display: flex; border-bottom: 1px solid var(--line); }
.gantt-row:last-child { border-bottom: none; }
.gantt-row.task-row { background: rgba(27,36,48,0.02); }
.gantt-label {
  flex: 0 0 150px; width: 150px; padding: 7px 10px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  border-right: 1px solid var(--line); position: sticky; left: 0; background: var(--paper); z-index: 2;
}
.gantt-row.task-row .gantt-label { background: #F7F8FA; }
.gantt-label:hover { color: var(--blue); }
.gantt-label.sub { font-weight: 500; font-size: 11px; color: var(--muted); padding-left: 22px; }
.gantt-label-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.gantt-track { position: relative; min-height: 34px; }
.gantt-row.task-row .gantt-track { min-height: 26px; }
.gantt-bar {
  position: absolute; top: 50%; transform: translateY(-50%); height: 20px;
  border-radius: 4px; display: flex; align-items: center; padding: 0 8px;
  font-size: 10px; font-weight: 700; white-space: nowrap; overflow: hidden;
  cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.15); transition: filter 0.1s ease;
}
.gantt-bar:hover { filter: brightness(1.08); }
.gantt-bar.task-bar { height: 14px; font-size: 9px; }
.gantt-bar.task-bar.done { opacity: 0.4; text-decoration: line-through; }
.gantt-bar.overflow { border-right: 3px dashed rgba(255,255,255,0.85); }
.gantt-bar.single { border: 2px solid rgba(255,255,255,0.9); }
.gantt-today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--urgent); z-index: 3; }
.gantt-today-label {
  position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
  background: var(--urgent); color: #fff; font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 3px; white-space: nowrap;
}

.ts-body { max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: 340px 1fr; gap: 20px; align-items: start; }
@media (max-width: 760px) { .ts-body { grid-template-columns: 1fr; } }

.ts-panel { background: var(--paper); border-radius: 10px; box-shadow: var(--shadow); padding: 18px; }
.ts-panel-title { font-weight: 700; font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

.ts-event-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.ts-event-card:hover, .ts-event-card.selected { border-color: var(--blue); background: var(--blue-soft); }
.ts-event-card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.ts-event-name { font-weight: 600; font-size: 14px; }
.ts-event-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
.ts-event-cat { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 20px; margin-top: 5px; font-weight: 600; }
.ts-countdown-chip { display: inline-block; margin-top: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 5px; }

.ts-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 10px; }

.ts-form { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; border-top: 1px dashed var(--line); padding-top: 14px; }
.ts-form input, .ts-form select { font-family: 'Inter', sans-serif; font-size: 13px; padding: 7px 9px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg); color: var(--ink); }
.ts-form input:focus, .ts-form select:focus { outline: 2px solid var(--blue); outline-offset: 1px; }
.ts-form-row { display: flex; gap: 8px; }
.ts-form-row > * { flex: 1; }
.ts-check-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; }
.ts-check-label input { width: auto; }
.ts-btn { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; padding: 8px 12px; border: none; border-radius: 6px; background: var(--ink); color: var(--paper); cursor: pointer; }
.ts-btn:hover { background: var(--blue); }
.ts-btn-ghost { background: none; color: var(--muted); border: 1px solid var(--line); }
.ts-btn-ghost:hover { color: var(--urgent); border-color: var(--urgent); background: var(--urgent-soft); }

.ts-detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
.ts-detail-title { font-family: 'Kalam', cursive; font-size: 24px; font-weight: 700; }
.ts-detail-date { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); margin-bottom: 14px; }

.ts-big-countdown { display: inline-flex; align-items: baseline; gap: 6px; padding: 10px 16px; border-radius: 8px; margin-bottom: 18px; font-family: 'JetBrains Mono', monospace; }
.ts-big-countdown .num { font-size: 28px; font-weight: 700; }
.ts-big-countdown .lab { font-size: 12px; }

.ts-task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
.ts-task { display: flex; align-items: center; gap: 10px; border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; }
.ts-task.done { opacity: 0.5; }
.ts-task.done .ts-task-name { text-decoration: line-through; }
.ts-task-name { flex: 1; font-size: 13px; font-weight: 500; }
.ts-task-deadline { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
.ts-task-chip { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px; white-space: nowrap; }
.ts-task-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1; padding: 2px 4px; }
.ts-task-del:hover { color: var(--urgent); }
.ts-task-check { width: 17px; height: 17px; accent-color: var(--ok); cursor: pointer; flex-shrink: 0; }

.ts-cat-general { background: var(--blue-soft); color: var(--blue); }
.ts-cat-prod { background: #F0E7FA; color: #7B4FB0; }
.ts-cat-meeting { background: var(--ok-soft); color: var(--ok); }
.ts-cat-other { background: #F2F2F2; color: var(--muted); }

.ts-loading { text-align: center; color: var(--muted); padding: 40px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* setup screen */
.ts-setup { max-width: 520px; margin: 60px auto; background: var(--paper); border-radius: 10px; box-shadow: var(--shadow); padding: 28px; }
.ts-setup h2 { font-family: 'Kalam', cursive; font-size: 22px; margin-top: 0; }
.ts-setup p { font-size: 13px; color: var(--muted); line-height: 1.7; }
.ts-setup ol { font-size: 13px; color: var(--ink); line-height: 1.9; padding-left: 20px; }
.ts-setup input { width: 100%; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 6px; margin: 10px 0; }
</style>
</head>
<body>
<div id="tsapp"><div class="ts-loading">読み込み中...</div></div>

<script>
(function() {
  const CATS = {
    general: { label: 'イベント', cls: 'ts-cat-general', color: '#3A6EA5' },
    prod:    { label: '制作',     cls: 'ts-cat-prod',    color: '#7B4FB0' },
    meeting: { label: '会議',     cls: 'ts-cat-meeting', color: '#2F9E64' },
    other:   { label: 'その他',   cls: 'ts-cat-other',   color: '#8A94A6' }
  };
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const API_URL_KEY = 'ts_api_url';

  let state = { events: [], selectedId: null, year: new Date().getFullYear(), editingEventId: null, editingTaskId: null, showPast: false };
  let dataLoaded = false;
  let storageOk = true;
  let ganttAutoScroll = true;
  let isSaving = false;
  // URLに ?api=... が付いていればそれを優先して使う(端末がリセットされる環境向け)。
  // 無ければブラウザに保存済みの設定(localStorage)を使う。
  const urlApi = new URLSearchParams(window.location.search).get('api');
  let apiUrl = urlApi || localStorage.getItem(API_URL_KEY) || '';
  if (urlApi) {
    try { localStorage.setItem(API_URL_KEY, urlApi); } catch (e) {}
  }

  function uid() { return Math.random().toString(36).slice(2, 10); }
  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escAttr(s) { return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
  function normalizeUrl(url) {
    if (!url) return '';
    const trimmed = url.trim();
    if (/^(javascript|data|vbscript):/i.test(trimmed)) return '';
    if (/^https?:\/\//i.test(trimmed)) return trimmed;
    return 'https://' + trimmed;
  }

  function daysUntil(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }
  function urgency(days) {
    if (days < 0) return { key: 'urgent', text: '期限超過 ' + Math.abs(days) + '日' };
    if (days === 0) return { key: 'urgent', text: '本日締切' };
    if (days <= 3) return { key: 'urgent', text: 'あと' + days + '日' };
    if (days <= 7) return { key: 'warn', text: 'あと' + days + '日' };
    return { key: 'ok', text: 'あと' + days + '日' };
  }
  const URGENCY_CHIP = {
    urgent: 'background: var(--urgent-soft); color: var(--urgent);',
    warn:   'background: var(--warn-soft); color: var(--warn);',
    ok:     'background: var(--blue-soft); color: var(--blue);'
  };
  const URGENCY_BAR = {
    urgent: 'background: var(--urgent); color: #fff;',
    warn:   'background: var(--warn); color: #2a1d05;',
    ok:     'background: var(--blue); color: #fff;'
  };

  const DAY_WIDTH = 24;
  const LABEL_WIDTH = 150;

  function pad2(n) { return String(n).padStart(2, '0'); }
  function fmtDate(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function isLeapYear(y) { return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0; }
  function daysInYear(y) { return isLeapYear(y) ? 366 : 365; }
  function dayIndexOf(dateStr, year) {
    const d = new Date(dateStr + 'T00:00:00');
    const start = new Date(year, 0, 1);
    return Math.round((d - start) / 86400000);
  }
  function clamp(n, min, max) { return Math.min(max, Math.max(min, n)); }
  function monthInfo(year) {
    const arr = [];
    for (let m = 0; m < 12; m++) {
      const start = new Date(year, m, 1);
      const end = new Date(year, m + 1, 0);
      const startIdx = Math.round((start - new Date(year, 0, 1)) / 86400000);
      arr.push({ month: m + 1, startIdx, len: end.getDate() });
    }
    return arr;
  }

  // 日本の祝日(概算)。春分・秋分は計算式による近似、振替休日にも簡易対応。
  function getJapaneseHolidays(year) {
    const holidays = new Set();
    function add(m, d) { holidays.add(year + '-' + pad2(m) + '-' + pad2(d)); }
    function nthMonday(month, nth) {
      let count = 0;
      for (let d = 1; d <= 31; d++) {
        const dt = new Date(year, month - 1, d);
        if (dt.getMonth() !== month - 1) break;
        if (dt.getDay() === 1) { count++; if (count === nth) return d; }
      }
      return null;
    }
    add(1, 1);
    add(1, nthMonday(1, 2));
    add(2, 11);
    add(2, 23);
    add(3, Math.floor(20.8431 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4)));
    add(4, 29);
    add(5, 3); add(5, 4); add(5, 5);
    add(7, nthMonday(7, 3));
    add(8, 11);
    add(9, nthMonday(9, 3));
    add(9, Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4)));
    add(10, nthMonday(10, 2));
    add(11, 3);
    add(11, 23);
    const toAdd = [];
    holidays.forEach(dateStr => {
      const dt = new Date(dateStr + 'T00:00:00');
      if (dt.getDay() === 0) {
        let next = new Date(dt);
        do { next.setDate(next.getDate() + 1); } while (holidays.has(fmtDate(next)));
        toAdd.push(fmtDate(next));
      }
    });
    toAdd.forEach(d => holidays.add(d));
    return holidays;
  }

  async function loadData() {
    if (!apiUrl) { dataLoaded = true; return; }
    try {
      const res = await fetch(apiUrl, { method: 'GET' });
      const json = await res.json();
      state.events = json.events || [];
      storageOk = true;
    } catch (e) {
      console.error('読み込みに失敗しました', e);
      if (!dataLoaded) state.events = [];
      storageOk = false;
    }
    dataLoaded = true;
  }

  async function saveData() {
    if (!apiUrl) return;
    isSaving = true;
    try {
      await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ events: state.events })
      });
      storageOk = true;
    } catch (e) {
      console.error('保存に失敗しました', e);
      storageOk = false;
    } finally {
      isSaving = false;
    }
  }

  function fieldFocused() {
    const el = document.activeElement;
    return el && (el.tagName === 'INPUT' || el.tagName === 'SELECT');
  }

  function renderSetup() {
    const app = document.getElementById('tsapp');
    app.innerHTML = `
      <div class="ts-setup">
        <h2>初期設定：保存先を接続してください</h2>
        <p>このサイトはGoogle Apps Scriptで作った保存先(API)とつないで使います。まだの場合は、共有された手順に沿ってApps ScriptのウェブアプリURLを発行してください。</p>
        <ol>
          <li>Googleスプレッドシートを新規作成</li>
          <li>拡張機能 → Apps Script を開き、渡されたコードを貼り付けて保存</li>
          <li>デプロイ → 新しいデプロイ → 種類「ウェブアプリ」</li>
          <li>アクセスできるユーザー「全員」にしてデプロイ</li>
          <li>発行された ウェブアプリのURL(.../exec で終わるもの) を下に貼り付け</li>
        </ol>
        <input type="text" id="apiUrlInput" autocomplete="off" placeholder="https://script.google.com/macros/s/.../exec" value="${esc(apiUrl)}" />
        <button class="ts-btn" id="apiUrlSave">保存してはじめる</button>
      </div>
    `;
    document.getElementById('apiUrlSave').addEventListener('click', async () => {
      const val = document.getElementById('apiUrlInput').value.trim();
      if (!val) return;
      apiUrl = val;
      localStorage.setItem(API_URL_KEY, apiUrl);
      dataLoaded = false;
      render();
      await loadData();
      render();
      startPolling();
    });
  }

  function render() {
    if (!apiUrl) { renderSetup(); return; }
    const app = document.getElementById('tsapp');
    if (!dataLoaded) { app.innerHTML = '<div class="ts-loading">読み込み中...</div>'; return; }

    const sorted = [...state.events].sort((a,b) => {
      if (!a.date && !b.date) return 0;
      if (!a.date) return -1;
      if (!b.date) return 1;
      return a.date.localeCompare(b.date);
    });
    const todayStr = fmtDate(new Date());
    const pastCount = state.events.filter(e => e.date && e.date < todayStr).length;
    const visibleSorted = state.showPast ? sorted : sorted.filter(e => !e.date || e.date >= todayStr);
    const undatedCount = state.events.filter(e => !e.date && !e.tasks.some(t => t.deadline)).length;
    const selected = state.events.find(e => e.id === state.selectedId) || null;
    const prevScrollEl = document.getElementById('ganttScroll');
    const prevScroll = prevScrollEl ? prevScrollEl.scrollLeft : null;
    const todayIdx = dayIndexOf(todayStr, state.year);
    const totalDaysThisYear = daysInYear(state.year);

    app.innerHTML = `
      <div class="ts-header">
        <div>
          <div class="ts-title">年間SCHEDULE</div>
        </div>
        <div>
          <button class="ts-linkbtn" id="btnCopyLink">設定込みURLをコピー</button>
          <button class="ts-reset" id="btnReset">全データを削除</button>
          <button class="ts-linkbtn" id="btnChangeApi">保存先の設定を変更</button>
        </div>
      </div>

      ${!storageOk ? `<div class="ts-banner">⚠ 保存先(Apps Script)に接続できませんでした。URLが正しいか、デプロイ設定(アクセス「全員」)を確認してください。</div>` : ''}

      <div class="ts-ruler-wrap">
        <div class="ts-ruler-head">
          <div class="ts-year-nav">
            <button class="ts-year-btn" id="yearPrev">‹</button>
            <span>${state.year}年</span>
            <button class="ts-year-btn" id="yearNext">›</button>
          </div>
          <div class="ts-sub">横にスクロール可能・バーをクリックで詳細を表示</div>
        </div>
        ${renderGantt(visibleSorted, todayIdx, totalDaysThisYear)}
        ${undatedCount > 0 ? `<div class="ts-sub" style="margin-top:8px;">※ 日付未定のイベントが${undatedCount}件あります(下の一覧に表示、ガントチャートには表示されません)</div>` : ''}
      </div>

      <div class="ts-body">
        <div class="ts-panel">
          <div class="ts-panel-title">
            <span>イベント一覧 (${visibleSorted.length})</span>
            ${pastCount > 0 ? `<button class="ts-linkbtn" id="btnTogglePast" style="margin:0;">${state.showPast ? '過去のイベントを隠す' : `過去のイベント(${pastCount}件)を表示`}</button>` : ''}
          </div>
          <div id="eventList">
            ${visibleSorted.length === 0 ? '<div class="ts-empty">まだイベントがありません。<br>下のフォームから追加してください。</div>' : visibleSorted.map(ev => renderEventCard(ev)).join('')}
          </div>
          <form class="ts-form" id="eventForm" autocomplete="off">
            <input type="text" id="newEventTitle" autocomplete="off" placeholder="イベント名" required />
            <div class="ts-form-row">
              <input type="date" id="newEventDate" autocomplete="off" placeholder="日付(あとで設定してもOK)" />
              <select id="newEventCat">
                ${Object.entries(CATS).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join('')}
              </select>
            </div>
            <label class="ts-check-label"><input type="checkbox" id="newEventSingleDay" /> その日だけの予定(単発)にする</label>
            <input type="text" id="newEventLink" autocomplete="off" placeholder="関連リンク(任意・URL)" />
            <button type="submit" class="ts-btn">+ イベントを追加</button>
          </form>
        </div>

        <div class="ts-panel">
          ${selected ? renderDetail(selected) : '<div class="ts-empty">左のイベントを選ぶと、<br>本番日までのカウントダウンと<br>準備タスクの締切が表示されます。</div>'}
        </div>
      </div>
    `;
    attachEvents(sorted, selected);

    const scrollEl = document.getElementById('ganttScroll');
    if (scrollEl) {
      if (ganttAutoScroll && todayIdx >= 0 && todayIdx < totalDaysThisYear) {
        scrollEl.scrollLeft = Math.max(0, todayIdx * DAY_WIDTH - 60);
        ganttAutoScroll = false;
      } else if (prevScroll != null) {
        scrollEl.scrollLeft = prevScroll;
      }
    }
  }

  function renderGantt(sorted, todayIdx, totalDays) {
    const year = state.year;
    const holidays = getJapaneseHolidays(year);
    const months = monthInfo(year);
    const totalWidth = totalDays * DAY_WIDTH;

    const monthRow = months.map(m =>
      `<div class="gantt-month" style="left:${m.startIdx * DAY_WIDTH}px;width:${m.len * DAY_WIDTH}px;">${m.month}月</div>`
    ).join('');

    let dayRow = '';
    for (let i = 0; i < totalDays; i++) {
      const d = new Date(year, 0, 1 + i);
      const dateStr = fmtDate(d);
      const dow = d.getDay();
      let cls = 'gantt-day';
      if (holidays.has(dateStr) || dow === 0) cls += ' sun';
      else if (dow === 6) cls += ' sat';
      dayRow += `<div class="${cls}" style="left:${i * DAY_WIDTH}px;width:${DAY_WIDTH}px;">${d.getDate()}</div>`;
    }

    let todayLine = '';
    if (todayIdx >= 0 && todayIdx < totalDays) {
      todayLine = `<div class="gantt-today-line" style="left:${LABEL_WIDTH + todayIdx * DAY_WIDTH + DAY_WIDTH / 2}px;"><span class="gantt-today-label">Today</span></div>`;
    }

    function barGeom(dateStr, singleDay) {
      const idx = clamp(dayIndexOf(dateStr, year), 0, totalDays - 1);
      const isOverflow = Number(dateStr.slice(0, 4)) > year;
      if (singleDay) {
        return { left: idx * DAY_WIDTH, width: DAY_WIDTH, isOverflow };
      }
      const s = clamp(Math.min(todayIdx, idx), 0, totalDays - 1);
      const e = clamp(Math.max(todayIdx, idx), 0, totalDays - 1);
      return { left: s * DAY_WIDTH, width: Math.max(DAY_WIDTH, (e - s + 1) * DAY_WIDTH), isOverflow };
    }

    function taskRowsHtml(ev) {
      const tasks = [...ev.tasks].sort((a,b) => (a.deadline || '').localeCompare(b.deadline || ''));
      let html = '';
      for (const t of tasks) {
        if (!t.deadline) {
          html += `
            <div class="gantt-row task-row">
              <div class="gantt-label sub" data-id="${ev.id}">${esc(t.title)}${t.done ? ' ✓' : ''}</div>
              <div class="gantt-track" style="width:${totalWidth}px;">
                <span style="position:absolute; left:6px; top:50%; transform:translateY(-50%); font-size:9px; color:var(--muted); font-family:'JetBrains Mono',monospace;">締切未定</span>
              </div>
            </div>`;
          continue;
        }
        const tu = urgency(daysUntil(t.deadline));
        const g = barGeom(t.deadline, t.singleDay);
        html += `
          <div class="gantt-row task-row">
            <div class="gantt-label sub" data-id="${ev.id}">${esc(t.title)}${t.done ? ' ✓' : ''}</div>
            <div class="gantt-track" style="width:${totalWidth}px;">
              <div class="gantt-bar task-bar${t.done ? ' done' : ''}${t.singleDay ? ' single' : ''}${g.isOverflow ? ' overflow' : ''}" data-id="${ev.id}" data-task="${t.id}" style="left:${g.left}px;width:${g.width}px;${URGENCY_BAR[tu.key]}">
                ${t.singleDay ? '● ' : ''}${esc(t.title)}
              </div>
            </div>
          </div>`;
      }
      return html;
    }

    const undatedWithTasks = sorted.filter(ev => !ev.date && ev.tasks.some(t => t.deadline));
    const yearEvents = sorted.filter(ev => ev.date && Number(ev.date.slice(0, 4)) >= year);
    let rowsHtml = '';

    for (const ev of undatedWithTasks) {
      const cat = CATS[ev.category] || CATS.other;
      const sel = ev.id === state.selectedId ? ' selected' : '';
      rowsHtml += `
        <div class="gantt-row">
          <div class="gantt-label${sel}" data-id="${ev.id}">
            <span class="gantt-label-dot" style="background:${cat.color}"></span>${esc(ev.title)}
          </div>
          <div class="gantt-track" style="width:${totalWidth}px;">
            <span style="position:absolute; left:6px; top:50%; transform:translateY(-50%); font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace;">本番日未定(タスクの締切のみ設定中)</span>
          </div>
        </div>`;
      rowsHtml += taskRowsHtml(ev);
    }

    for (const ev of yearEvents) {
      const cat = CATS[ev.category] || CATS.other;
      const days = daysUntil(ev.date);
      const u = urgency(days);
      const g = barGeom(ev.date, ev.singleDay);
      const sel = ev.id === state.selectedId ? ' selected' : '';

      rowsHtml += `
        <div class="gantt-row">
          <div class="gantt-label${sel}" data-id="${ev.id}">
            <span class="gantt-label-dot" style="background:${cat.color}"></span>${esc(ev.title)}
          </div>
          <div class="gantt-track" style="width:${totalWidth}px;">
            <div class="gantt-bar${ev.singleDay ? ' single' : ''}${g.isOverflow ? ' overflow' : ''}" data-id="${ev.id}" style="left:${g.left}px;width:${g.width}px;${URGENCY_BAR[u.key]}">
              ${ev.singleDay ? '● ' : ''}${esc(ev.title)}・${u.text}${g.isOverflow ? `(${ev.date} へ ▶)` : ''}
            </div>
          </div>
        </div>`;

      rowsHtml += taskRowsHtml(ev);
    }
    if (!rowsHtml) {
      rowsHtml = `<div class="ts-empty" style="padding:26px 10px;">この年のイベントはまだありません。<br>下のフォームから追加すると、ここにガントチャートが表示されます。</div>`;
    }

    return `
      <div class="gantt-scroll" id="ganttScroll">
        <div class="gantt-inner" style="width:${LABEL_WIDTH + totalWidth}px;">
          <div class="gantt-header">
            <div class="gantt-header-label"></div>
            <div class="gantt-header-track" style="width:${totalWidth}px;">
              <div class="gantt-month-row">${monthRow}</div>
              <div class="gantt-day-row">${dayRow}</div>
            </div>
          </div>
          <div class="gantt-body">${rowsHtml}</div>
          ${todayLine}
        </div>
      </div>
    `;
  }

  function renderEventCard(ev) {
    const cat = CATS[ev.category] || CATS.other;
    const sel = ev.id === state.selectedId ? ' selected' : '';
    const pending = ev.tasks.filter(t => !t.done).length;
    const countdownHtml = ev.date
      ? (() => { const u = urgency(daysUntil(ev.date)); return `<span class="ts-countdown-chip" style="${URGENCY_CHIP[u.key]}">${u.text}</span>`; })()
      : `<span class="ts-countdown-chip" style="background:#F2F2F2;color:var(--muted)">日付未定</span>`;
    return `
      <div class="ts-event-card${sel}" data-id="${ev.id}">
        <div class="ts-event-card-top">
          <span class="ts-event-name">${esc(ev.title)}</span>
          ${ev.link ? `<a href="${escAttr(normalizeUrl(ev.link))}" target="_blank" rel="noopener noreferrer" title="${esc(ev.link)}" onclick="event.stopPropagation()">🔗</a>` : ''}
        </div>
        <span class="ts-event-date">${ev.date || '日付未定'}</span>
        <div>
          <span class="ts-event-cat ${cat.cls}">${cat.label}</span>
          ${pending > 0 ? `<span class="ts-event-cat" style="background:#F2F2F2;color:var(--muted)">タスク${pending}件</span>` : ''}
        </div>
        <div>${countdownHtml}</div>
      </div>
    `;
  }

  function renderDetail(ev) {
    const cat = CATS[ev.category] || CATS.other;
    const tasks = [...ev.tasks].sort((a,b) => (a.deadline || '').localeCompare(b.deadline || ''));

    if (state.editingEventId === ev.id) {
      return `
        <div class="ts-panel-title" style="margin-bottom:10px;">イベントを編集</div>
        <form class="ts-form" id="eventEditForm" autocomplete="off" style="border-top:none; padding-top:0; margin-top:0;">
          <input type="text" id="editEventTitle" autocomplete="off" placeholder="イベント名" value="${esc(ev.title)}" required />
          <div class="ts-form-row">
            <input type="date" id="editEventDate" autocomplete="off" value="${ev.date || ''}" />
            <select id="editEventCat">
              ${Object.entries(CATS).map(([k,v]) => `<option value="${k}" ${k===ev.category?'selected':''}>${v.label}</option>`).join('')}
            </select>
          </div>
          <label class="ts-check-label"><input type="checkbox" id="editEventSingleDay" ${ev.singleDay ? 'checked' : ''} /> その日だけの予定(単発)にする</label>
          <input type="text" id="editEventLink" autocomplete="off" placeholder="関連リンク(任意・URL)" value="${esc(ev.link || '')}" />
          <div class="ts-form-row">
            <button type="submit" class="ts-btn">保存する</button>
            <button type="button" class="ts-btn ts-btn-ghost" id="eventEditCancel">キャンセル</button>
          </div>
        </form>
      `;
    }

    const countdownBlock = ev.date
      ? (() => {
          const days = daysUntil(ev.date);
          const u = urgency(days);
          return `<div class="ts-big-countdown" style="${URGENCY_CHIP[u.key]}">
            <span class="num">${days < 0 ? Math.abs(days) : days}</span>
            <span class="lab">${days < 0 ? '日超過' : days === 0 ? '本日が本番日' : '日後が本番日'}</span>
          </div>`;
        })()
      : `<div class="ts-empty" style="text-align:left; padding:10px 0;">本番日が未設定です。「編集」から日付を設定できます。</div>`;

    return `
      <div class="ts-detail-head">
        <div>
          <div class="ts-detail-title">${esc(ev.title)}${ev.link ? ` <a href="${escAttr(normalizeUrl(ev.link))}" target="_blank" rel="noopener noreferrer" style="font-size:16px;">🔗</a>` : ''}</div>
          <div class="ts-detail-date">${ev.date || '日付未定'}${ev.singleDay ? ' ・単発' : ''} ・ <span class="ts-event-cat ${cat.cls}">${cat.label}</span></div>
        </div>
        <div style="display:flex; gap:6px; flex-shrink:0;">
          <button class="ts-btn ts-btn-ghost" data-edit-event="${ev.id}">編集</button>
          <button class="ts-btn ts-btn-ghost" data-del-event="${ev.id}">削除</button>
        </div>
      </div>
      ${countdownBlock}
      <div class="ts-panel-title" style="margin-bottom:8px;">準備タスクの締切 (${tasks.length})</div>
      <div class="ts-task-list" id="taskList">
        ${tasks.length === 0 ? '<div class="ts-empty">準備タスクを追加してください。</div>' : tasks.map(t => renderTask(ev.id, t)).join('')}
      </div>
      <form class="ts-form" id="taskForm" autocomplete="off">
        <input type="text" id="newTaskTitle" autocomplete="off" placeholder="準備タスク名(例: 会場予約)" required />
        <div class="ts-form-row">
          <input type="date" id="newTaskDeadline" autocomplete="off" placeholder="締切(あとで設定してもOK)" />
          <button type="submit" class="ts-btn">+ タスクを追加</button>
        </div>
        <label class="ts-check-label"><input type="checkbox" id="newTaskSingleDay" /> その日だけの予定(単発)にする</label>
        <input type="text" id="newTaskLink" autocomplete="off" placeholder="関連リンク(任意・URL)" />
      </form>
    `;
  }

  function renderTask(eventId, t) {
    if (state.editingTaskId === t.id) {
      return `
        <div class="ts-task" style="flex-wrap:wrap;">
          <input type="text" id="editTaskTitle_${t.id}" autocomplete="off" value="${esc(t.title)}" style="flex:1 1 140px; font-size:12px; padding:5px 7px; border:1px solid var(--line); border-radius:5px;" />
          <input type="date" id="editTaskDeadline_${t.id}" autocomplete="off" value="${t.deadline || ''}" style="font-size:12px; padding:5px 7px; border:1px solid var(--line); border-radius:5px;" />
          <label class="ts-check-label" style="flex-basis:100%;"><input type="checkbox" id="editTaskSingleDay_${t.id}" ${t.singleDay ? 'checked' : ''} /> 単発</label>
          <input type="text" id="editTaskLink_${t.id}" autocomplete="off" placeholder="関連リンク(任意・URL)" value="${esc(t.link || '')}" style="flex-basis:100%; font-size:12px; padding:5px 7px; border:1px solid var(--line); border-radius:5px;" />
          <button class="ts-btn" style="padding:5px 9px; font-size:11px;" data-task-save="${t.id}">保存</button>
          <button class="ts-btn ts-btn-ghost" style="padding:5px 9px; font-size:11px;" data-task-edit-cancel="${t.id}">取消</button>
        </div>
      `;
    }
    const chipHtml = t.deadline
      ? (() => { const u = urgency(daysUntil(t.deadline)); return `<span class="ts-task-chip" style="${URGENCY_CHIP[u.key]}">${u.text}</span>`; })()
      : `<span class="ts-task-chip" style="background:#F2F2F2;color:var(--muted)">締切未定</span>`;
    return `
      <div class="ts-task${t.done ? ' done' : ''}">
        <input type="checkbox" class="ts-task-check" data-task-toggle="${t.id}" ${t.done ? 'checked' : ''} />
        <span class="ts-task-name">${esc(t.title)}${t.singleDay ? ' <span style="color:var(--muted);font-weight:400;">(単発)</span>' : ''}${t.link ? ` <a href="${escAttr(normalizeUrl(t.link))}" target="_blank" rel="noopener noreferrer" title="${esc(t.link)}">🔗</a>` : ''}</span>
        <span class="ts-task-deadline">${t.deadline || '締切未定'}</span>
        ${!t.done ? chipHtml : ''}
        <button class="ts-task-del" data-task-edit="${t.id}" title="編集">✎</button>
        <button class="ts-task-del" data-task-del="${t.id}" title="削除">✕</button>
      </div>
    `;
  }

  function attachEvents(sorted, selected) {
    document.querySelectorAll('.gantt-bar, .gantt-label[data-id], .ts-event-card').forEach(el => {
      el.addEventListener('click', () => {
        state.selectedId = el.dataset.id;
        state.editingEventId = null;
        state.editingTaskId = null;
        render();
      });
    });
    document.getElementById('yearPrev').addEventListener('click', () => { state.year--; ganttAutoScroll = true; render(); });
    document.getElementById('yearNext').addEventListener('click', () => { state.year++; ganttAutoScroll = true; render(); });
    const togglePastBtn = document.getElementById('btnTogglePast');
    if (togglePastBtn) {
      togglePastBtn.addEventListener('click', () => { state.showPast = !state.showPast; render(); });
    }

    document.getElementById('btnCopyLink').addEventListener('click', () => {
      const link = window.location.origin + window.location.pathname + '?api=' + encodeURIComponent(apiUrl);
      navigator.clipboard.writeText(link).then(() => {
        alert('コピーしました。このリンクなら、保存先の設定なしでそのまま開けます。\n\n' + link);
      }).catch(() => {
        prompt('コピーに失敗しました。下のURLを手動でコピーしてください。', link);
      });
    });

    document.getElementById('btnChangeApi').addEventListener('click', () => {
      apiUrl = '';
      localStorage.removeItem(API_URL_KEY);
      dataLoaded = false;
      render();
    });

    document.getElementById('btnReset').addEventListener('click', async () => {
      if (confirm('本当に全てのイベントとタスクを削除しますか？この操作は取り消せません。')) {
        state.events = [];
        state.selectedId = null;
        await saveData();
        render();
      }
    });

    document.getElementById('eventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('newEventTitle').value.trim();
      const date = document.getElementById('newEventDate').value;
      const category = document.getElementById('newEventCat').value;
      const singleDay = document.getElementById('newEventSingleDay').checked;
      const link = document.getElementById('newEventLink').value.trim();
      if (!title) return;
      const newEv = { id: uid(), title, date, category, singleDay, link, tasks: [] };
      state.events.push(newEv);
      state.selectedId = newEv.id;
      await saveData();
      render();
    });

    if (selected) {
      const delBtn = document.querySelector('[data-del-event]');
      if (delBtn) {
        delBtn.addEventListener('click', async () => {
          if (confirm(`「${selected.title}」を削除しますか？`)) {
            state.events = state.events.filter(e => e.id !== selected.id);
            state.selectedId = null;
            await saveData();
            render();
          }
        });
      }

      const editBtn = document.querySelector('[data-edit-event]');
      if (editBtn) {
        editBtn.addEventListener('click', () => {
          state.editingEventId = selected.id;
          render();
        });
      }

      const eventEditForm = document.getElementById('eventEditForm');
      if (eventEditForm) {
        eventEditForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const title = document.getElementById('editEventTitle').value.trim();
          const dateVal = document.getElementById('editEventDate').value;
          if (!title) return;
          selected.title = title;
          selected.date = dateVal;
          selected.category = document.getElementById('editEventCat').value;
          selected.singleDay = document.getElementById('editEventSingleDay').checked;
          selected.link = document.getElementById('editEventLink').value.trim();
          state.editingEventId = null;
          await saveData();
          render();
        });
        document.getElementById('eventEditCancel').addEventListener('click', () => {
          state.editingEventId = null;
          render();
        });
      }

      const taskForm = document.getElementById('taskForm');
      if (taskForm) {
        taskForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const title = document.getElementById('newTaskTitle').value.trim();
          const deadline = document.getElementById('newTaskDeadline').value;
          const singleDay = document.getElementById('newTaskSingleDay').checked;
          const link = document.getElementById('newTaskLink').value.trim();
          if (!title) return;
          selected.tasks.push({ id: uid(), title, deadline, singleDay, link, done: false });
          await saveData();
          render();
        });
        document.querySelectorAll('[data-task-toggle]').forEach(el => {
          el.addEventListener('change', async () => {
            const t = selected.tasks.find(t => t.id === el.dataset.taskToggle);
            if (t) t.done = el.checked;
            await saveData();
            render();
          });
        });
        document.querySelectorAll('[data-task-del]').forEach(el => {
          el.addEventListener('click', async () => {
            selected.tasks = selected.tasks.filter(t => t.id !== el.dataset.taskDel);
            await saveData();
            render();
          });
        });
        document.querySelectorAll('[data-task-edit]').forEach(el => {
          el.addEventListener('click', () => {
            state.editingTaskId = el.dataset.taskEdit;
            render();
          });
        });
        document.querySelectorAll('[data-task-edit-cancel]').forEach(el => {
          el.addEventListener('click', () => {
            state.editingTaskId = null;
            render();
          });
        });
        document.querySelectorAll('[data-task-save]').forEach(el => {
          el.addEventListener('click', async () => {
            const id = el.dataset.taskSave;
            const t = selected.tasks.find(t => t.id === id);
            const titleEl = document.getElementById('editTaskTitle_' + id);
            const deadlineEl = document.getElementById('editTaskDeadline_' + id);
            const singleDayEl = document.getElementById('editTaskSingleDay_' + id);
            const linkEl = document.getElementById('editTaskLink_' + id);
            const title = titleEl.value.trim();
            const deadline = deadlineEl.value;
            if (!title || !t) return;
            t.title = title;
            t.deadline = deadline;
            t.singleDay = singleDayEl ? singleDayEl.checked : false;
            t.link = linkEl ? linkEl.value.trim() : '';
            state.editingTaskId = null;
            await saveData();
            render();
          });
        });
      }
    }
  }

  let pollTimer = null;
  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      if (!apiUrl || fieldFocused() || state.editingEventId || state.editingTaskId || isSaving) return;
      await loadData();
      render();
    }, 15000);
  }

  async function init() {
    if (apiUrl) {
      render();
      await loadData();
      render();
      startPolling();
    } else {
      render();
    }
  }

  init();
})();
</script>
</body>
</html>
